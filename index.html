<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />

    
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <!-- ================= LOGIN CARD ================= -->

    <div class="bg-white w-[420px] p-8 rounded-xl shadow-lg">
      <!-- LOGO -->

      <div class="text-center">
        <img src="assets/github-logo.png" class="w-20 mx-auto" />

        <h1 class="text-2xl font-bold mt-4">GitHub Issues Tracker</h1>

        <p class="text-gray-500 mt-1">Sign in to manage your issues</p>
      </div>

      <!-- ================= FORM ================= -->

      <div class="mt-6 space-y-4">
        <label class="text-sm font-semibold"> Username </label>

        <input
          id="username"
          type="text"
          placeholder="Enter Username"
          class="input input-bordered w-full"
        />

        <p class="text-sm text-blue-600">Default: admin</p>

        <label class="text-sm font-semibold"> Password </label>

        <input
          id="password"
          type="password"
          placeholder="Enter Password"
          class="input input-bordered w-full"
        />

        <p class="text-sm text-blue-600">Default: admin123</p>

        <button
          onclick="login()"
          class="btn w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white border-none mt-2"
        >
          Sign In
        </button>
      </div>

      <div class="divider">OR</div>

      <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">
        <p><b>Username:</b> admin</p>
        <p><b>Password:</b> admin123</p>
      </div>
    </div>

    <!-- ================= SCRIPT ================= -->

    <script src="script.js"></script>
  </body>
</html>
